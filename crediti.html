<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self'; font-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self'; worker-src 'self'; manifest-src 'self'"
  />
  <title>Crediti | Batman Comic Reader</title>
  <meta name="theme-color" content="#000000" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Comic Reader" />
  <link rel="manifest" href="./manifest.json?v=7" />
  <link rel="icon" href="./icons/icon-192.png?v=7" type="image/png" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png?v=7" />
  <link rel="stylesheet" href="./app.css?v=7" />
</head>
<body class="credits-page">
  <video id="bg-video" autoplay muted loop playsinline preload="metadata">
    <source src="gotham.mp4" type="video/mp4" />
  </video>

  <button
    id="hamburger-toggle"
    class="hamburger-toggle"
    type="button"
    aria-label="Apri menu principale"
    aria-controls="site-drawer"
    aria-expanded="false"
  >
    <span aria-hidden="true">&#9776;</span>
  </button>

  <div id="site-drawer-overlay" class="site-drawer-overlay" hidden></div>

    <aside
      id="site-drawer"
      class="site-drawer"
      aria-label="Menu principale"
      aria-hidden="true"
      inert
    >
      <nav class="site-drawer-nav" aria-label="Link principali">
      <a href="./index.html" class="site-drawer-link">
        <img class="site-drawer-link-icon" src="./assets/menu/home.png" alt="" aria-hidden="true" />
        <span class="site-drawer-link-label">Home</span>
      </a>
      <a href="./storie.html" class="site-drawer-link">
        <img class="site-drawer-link-icon" src="./assets/menu/storie.png" alt="" aria-hidden="true" />
        <span class="site-drawer-link-label">Storie</span>
      </a>
      <a href="./personaggi.html" class="site-drawer-link">
        <img class="site-drawer-link-icon" src="./assets/menu/personaggi.png" alt="" aria-hidden="true" />
        <span class="site-drawer-link-label">Personaggi</span>
      </a>
      <a href="./le-perle-di-bud.html" class="site-drawer-link">
        <img class="site-drawer-link-icon" src="./assets/menu/le-perle-di-bud.png" alt="" aria-hidden="true" />
        <span class="site-drawer-link-label">Le Perle di Bud</span>
      </a>
      <a href="./meanwhile-the-doctor.html" class="site-drawer-link">
        <img class="site-drawer-link-icon" src="./assets/menu/meanwhile-the-doctor.png" alt="" aria-hidden="true" />
        <span class="site-drawer-link-label">Meanwhile The Doctor</span>
      </a>
      <a href="./crediti.html" class="site-drawer-link" aria-current="page">
        <img class="site-drawer-link-icon" src="./assets/menu/crediti.png" alt="" aria-hidden="true" />
        <span class="site-drawer-link-label">Crediti</span>
      </a>
      </nav>
    </aside>

  <header class="credits-shell">
    <section class="credits-hero">
      <span class="stories-badge">Ciakkara Records</span>
      <h1 class="credits-title">Crediti</h1>
      <p class="credits-intro">
        Una sezione dedicata ai titoli di coda, ai ringraziamenti e a tutto il materiale svolto attualmente
      </p>
      <div class="stories-actions">
        <a class="credits-back-link" href="./index.html">Torna al Comic Reader</a>
      </div>
    </section>
  </header>

  <main class="credits-shell" role="main">
    <section class="credits-video-section">
      <section
        class="theme-song-card"
        id="credits-player-card"
        aria-label="Video crediti"
      >
        <video
          class="credits-player-video"
          id="credits-video-player"
          preload="none"
          poster="./assets/credits-poster.png"
        >
          <source src="./videos/crediti.mp4" type="video/mp4" />
          Il tuo browser non supporta il video HTML5.
        </video>

        <div class="theme-song-player-shell" aria-label="Controlli video crediti">
          <button
            class="theme-song-control theme-song-play"
            id="credits-play"
            type="button"
            aria-label="Riproduci video crediti"
            aria-pressed="false"
          >
            <span class="theme-song-control-icon" id="credits-play-icon">&#9654;</span>
          </button>
          <div class="theme-song-progress-block">
            <div class="theme-song-time" id="credits-time">00:00 / 00:00</div>
            <input
              class="theme-song-progress"
              id="credits-progress"
              type="range"
              min="0"
              max="100"
              value="0"
              step="0.1"
              aria-label="Avanzamento video crediti"
            />
          </div>
          <button
            class="theme-song-control theme-song-mute"
            id="credits-mute"
            type="button"
            aria-label="Attiva o disattiva audio"
            aria-pressed="false"
          >
            <span class="theme-song-control-icon" id="credits-mute-icon">&#128266;</span>
          </button>
        </div>
      </section>
    </section>

  </main>

  <script src="./site-menu.js?v=7" defer></script>
  <script src="./crediti.js?v=7" defer></script>
</body>
</html>
